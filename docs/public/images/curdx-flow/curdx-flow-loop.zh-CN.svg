<svg width="900" height="360" viewBox="0 0 900 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CurdX Flow 新手路径</title>
  <desc id="desc">从安装、开始、规格、执行、验证到恢复的简洁路径。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" stroke="#0F766E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="360" rx="24" fill="#FFFFFF"/>
  <rect x="28" y="28" width="844" height="304" rx="22" fill="#F8FAFC" stroke="#E2E8F0"/>

  <text x="56" y="76" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="28" font-weight="800">新手路径</text>
  <text x="56" y="106" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui" font-size="15">安装一次，输入一个目标，按规格执行，最后用证据确认。</text>

  <g font-family="Inter, ui-sans-serif, system-ui">
    <rect x="56" y="150" width="122" height="78" rx="14" fill="#EFF6FF" stroke="#BFDBFE"/>
    <text x="93" y="184" fill="#1D4ED8" font-size="18" font-weight="800">安装</text>
    <text x="85" y="208" fill="#475569" font-size="13">install</text>

    <rect x="222" y="150" width="122" height="78" rx="14" fill="#ECFDF5" stroke="#BBF7D0"/>
    <text x="259" y="184" fill="#047857" font-size="18" font-weight="800">开始</text>
    <text x="255" y="208" fill="#475569" font-size="13">start</text>

    <rect x="388" y="150" width="122" height="78" rx="14" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="425" y="184" fill="#C2410C" font-size="18" font-weight="800">规格</text>
    <text x="421" y="208" fill="#475569" font-size="13">specs</text>

    <rect x="554" y="150" width="122" height="78" rx="14" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="591" y="184" fill="#6D28D9" font-size="18" font-weight="800">执行</text>
    <text x="582" y="208" fill="#475569" font-size="13">tasks</text>

    <rect x="720" y="150" width="122" height="78" rx="14" fill="#FDF2F8" stroke="#FBCFE8"/>
    <text x="757" y="184" fill="#BE185D" font-size="18" font-weight="800">验证</text>
    <text x="752" y="208" fill="#475569" font-size="13">proof</text>
  </g>

  <path d="M188 189H212" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M354 189H378" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M520 189H544" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M686 189H710" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="150" y="266" width="600" height="38" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="182" y="291" fill="#334155" font-family="Inter, ui-sans-serif, system-ui" font-size="14">中途停了：运行 /curdx-flow:status，再运行 /curdx-flow:start 继续。</text>
</svg>
