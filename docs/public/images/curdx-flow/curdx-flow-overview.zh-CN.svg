<svg width="1100" height="520" viewBox="0 0 1100 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">curdx-flow 产品概览</title>
  <desc id="desc">展示 curdx-flow 如何把意图路由为规格、任务、执行和验证证据。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101827"/>
      <stop offset="0.55" stop-color="#12233A"/>
      <stop offset="1" stop-color="#172235"/>
    </linearGradient>
    <linearGradient id="accent" x1="130" y1="96" x2="940" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="0.52" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1100" height="520" rx="28" fill="url(#bg)"/>
  <path d="M87 402C231 241 365 167 489 180C612 193 694 281 812 269C901 260 967 203 1017 148" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
  <circle cx="151" cy="135" r="80" fill="#22C55E" opacity="0.08"/>
  <circle cx="952" cy="374" r="100" fill="#38BDF8" opacity="0.08"/>
  <text x="70" y="78" fill="#E5F0FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="800">curdx-flow</text>
  <text x="70" y="114" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18">Claude Code 的规格驱动执行层：从一句意图到可验证交付</text>
  <g filter="url(#shadow)">
    <rect x="70" y="165" width="210" height="132" rx="18" fill="#0F172A" stroke="#31435E"/>
    <text x="96" y="206" fill="#38BDF8" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="700">1. 智能路由</text>
    <text x="96" y="240" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="15">识别空仓库、前端、后端、</text>
    <text x="96" y="264" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="15">CLI、插件和发布风险。</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="325" y="165" width="210" height="132" rx="18" fill="#0F172A" stroke="#31435E"/>
    <text x="351" y="206" fill="#22C55E" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="700">2. 规格沉淀</text>
    <text x="351" y="240" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="15">research、requirements、</text>
    <text x="351" y="264" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="15">design、tasks 分阶段落盘。</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="580" y="165" width="210" height="132" rx="18" fill="#0F172A" stroke="#31435E"/>
    <text x="606" y="206" fill="#A78BFA" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="700">3. 任务执行</text>
    <text x="606" y="240" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="15">通过 /goal 和专用代理逐项</text>
    <text x="606" y="264" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="15">执行，失败可恢复。</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="835" y="165" width="210" height="132" rx="18" fill="#0F172A" stroke="#31435E"/>
    <text x="861" y="206" fill="#F59E0B" font-family="Inter, ui-sans-serif, system-ui" font-size="20" font-weight="700">4. 证据闭环</text>
    <text x="861" y="240" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="15">命令、浏览器、发布结果写入</text>
    <text x="861" y="264" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="15">verificationBlocks。</text>
  </g>
  <path d="M286 231H317" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
  <path d="M541 231H572" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
  <path d="M796 231H827" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
  <g>
    <rect x="150" y="355" width="800" height="86" rx="20" fill="#09111F" stroke="#1E3A55"/>
    <text x="190" y="388" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="17" font-weight="700">核心原则</text>
    <text x="190" y="420" fill="#AFC1D8" font-family="Inter, ui-sans-serif, system-ui" font-size="15">不只让模型“说完成”，而是要求它留下可复查的运行证据、浏览器证据和发布证据。</text>
  </g>
</svg>
