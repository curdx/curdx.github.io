<svg width="900" height="520" viewBox="0 0 900 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CurdX Flow 新手概览</title>
  <desc id="desc">展示从描述目标到生成规格、执行任务和验证完成的流程。</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" stroke="#2563EB" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="520" rx="24" fill="#F8FAFC"/>
  <rect x="28" y="28" width="844" height="464" rx="22" fill="#FFFFFF" stroke="#E2E8F0"/>

  <text x="56" y="78" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="30" font-weight="800">CurdX Flow</text>
  <text x="56" y="110" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="16">把一句需求变成可追踪、可验证的交付流程。</text>

  <g filter="url(#shadow)" font-family="Inter, ui-sans-serif, system-ui">
    <rect x="56" y="154" width="150" height="112" rx="15" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="78" y="176" width="36" height="36" rx="10" fill="#DBEAFE"/>
    <text x="91" y="200" fill="#1D4ED8" font-size="19" font-weight="800">1</text>
    <text x="78" y="232" fill="#0F172A" font-size="20" font-weight="800">描述目标</text>
    <text x="78" y="254" fill="#64748B" font-size="13">start</text>

    <rect x="270" y="154" width="150" height="112" rx="15" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="292" y="176" width="36" height="36" rx="10" fill="#DCFCE7"/>
    <text x="305" y="200" fill="#047857" font-size="19" font-weight="800">2</text>
    <text x="292" y="232" fill="#0F172A" font-size="20" font-weight="800">生成规格</text>
    <text x="292" y="254" fill="#64748B" font-size="13">计划写到文件</text>

    <rect x="484" y="154" width="150" height="112" rx="15" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="506" y="176" width="36" height="36" rx="10" fill="#FEF3C7"/>
    <text x="519" y="200" fill="#B45309" font-size="19" font-weight="800">3</text>
    <text x="506" y="232" fill="#0F172A" font-size="20" font-weight="800">执行任务</text>
    <text x="506" y="254" fill="#64748B" font-size="13">小步推进</text>

    <rect x="698" y="154" width="150" height="112" rx="15" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="720" y="176" width="36" height="36" rx="10" fill="#FCE7F3"/>
    <text x="733" y="200" fill="#BE185D" font-size="19" font-weight="800">4</text>
    <text x="720" y="232" fill="#0F172A" font-size="20" font-weight="800">验证完成</text>
    <text x="720" y="254" fill="#64748B" font-size="13">留下证据</text>
  </g>

  <path d="M216 210H258" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M430 210H472" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M644 210H686" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="56" y="330" width="370" height="92" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="84" y="365" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="800">你输入</text>
  <rect x="84" y="382" width="300" height="32" rx="8" fill="#0F172A"/>
  <text x="101" y="403" fill="#E2E8F0" font-family="SFMono-Regular, ui-monospace, monospace" font-size="12">/curdx-flow:start todo-app 做 Todo</text>

  <rect x="474" y="330" width="374" height="92" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="502" y="365" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="800">你得到</text>
  <text x="502" y="394" fill="#334155" font-family="Inter, ui-sans-serif, system-ui" font-size="15">规格文件、实现任务、验证证据</text>
</svg>
