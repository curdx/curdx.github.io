<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" role="img" aria-labelledby="ovTitleZh ovDescZh" font-family="'JetBrains Mono', ui-monospace, 'PingFang SC', 'Microsoft YaHei', SFMono-Regular, Menlo, Consolas, monospace">
  <title id="ovTitleZh">CurdX Flow 产品概览</title>
  <desc id="ovDescZh">把开发目标变成规格文件和验证证据，在 Claude Code 终端里完成。</desc>
  <defs>
    <linearGradient id="ovBgZh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#050817"/>
    </linearGradient>
    <linearGradient id="ovGreenZh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#86EFAC"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <marker id="ovArrZh" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L8 5 L0 10 Z" fill="#22C55E"/>
    </marker>
  </defs>

  <rect width="960" height="540" rx="22" fill="url(#ovBgZh)"/>
  <rect x="0.5" y="0.5" width="959" height="539" rx="21.5" fill="none" stroke="#1F2937"/>

  <path d="M0 22 Q0 0 22 0 L938 0 Q960 0 960 22 L960 44 L0 44 Z" fill="#0F172A"/>
  <circle cx="22" cy="22" r="5.5" fill="#475569"/>
  <circle cx="42" cy="22" r="5.5" fill="#475569"/>
  <circle cx="62" cy="22" r="5.5" fill="#475569"/>
  <text x="480" y="27" font-size="12" fill="#64748B" text-anchor="middle">— curdx-flow · 概览 —</text>
  <line x1="0" y1="44" x2="960" y2="44" stroke="#1F2937"/>

  <text x="40" y="84" font-size="22" fill="#E5E7EB" font-weight="700">从 <tspan fill="#FBBF24">「帮我做这个」</tspan> 到 <tspan fill="url(#ovGreenZh)">有证据的「真的做完了」</tspan></text>
  <text x="40" y="108" font-size="13" fill="#94A3B8">规格写进仓库 · 每次 PR 都带证据 · 跨会话可恢复</text>

  <g>
    <rect x="40" y="140" width="280" height="304" rx="14" fill="#111827" stroke="#1F2937"/>
    <rect x="40" y="140" width="280" height="32" rx="14" fill="#0F172A"/>
    <rect x="40" y="158" width="280" height="14" fill="#0F172A"/>
    <text x="56" y="161" font-size="10" fill="#64748B">01 · 目标</text>
    <circle cx="304" cy="156" r="3" fill="#FBBF24"/>

    <text x="56" y="200" font-size="14" fill="#E5E7EB" font-weight="700">先说清楚“完成”是什么</text>

    <rect x="56" y="218" width="248" height="174" rx="10" fill="#020617" stroke="#1F2937"/>
    <text x="72" y="244" font-size="11" fill="#64748B">$</text>
    <text x="88" y="244" font-size="11" fill="#4ADE80">/curdx-flow:start</text>
    <text x="72" y="266" font-size="11" fill="#E5E7EB">  todo-app</text>
    <text x="72" y="288" font-size="11" fill="#94A3B8">  "新增/编辑/完成/删除,</text>
    <text x="72" y="306" font-size="11" fill="#94A3B8">   并用浏览器验证"</text>
    <text x="72" y="362" font-size="11" fill="#64748B">$</text>
    <rect x="86" y="352" width="9" height="13" fill="#4ADE80">
      <animate attributeName="opacity" values="1;0.15;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <text x="56" y="420" font-size="10" fill="#64748B">一句话上手</text>
    <text x="56" y="434" font-size="10" fill="#64748B">不用先学 agent / hook</text>
  </g>

  <path d="M328 290 L360 290" stroke="#22C55E" stroke-width="2" marker-end="url(#ovArrZh)"/>

  <g>
    <rect x="368" y="140" width="280" height="304" rx="14" fill="#111827" stroke="#1F2937"/>
    <rect x="368" y="140" width="280" height="32" rx="14" fill="#0F172A"/>
    <rect x="368" y="158" width="280" height="14" fill="#0F172A"/>
    <text x="384" y="161" font-size="10" fill="#64748B">02 · spec/</text>
    <circle cx="632" cy="156" r="3" fill="#A78BFA"/>

    <text x="384" y="200" font-size="14" fill="#E5E7EB" font-weight="700">把方案钉进项目文件</text>

    <rect x="384" y="218" width="248" height="174" rx="10" fill="#020617" stroke="#1F2937"/>
    <text x="400" y="244" font-size="11" fill="#64748B">specs/todo-app/</text>
    <text x="412" y="266" font-size="11" fill="#E5E7EB">├── research.md</text>
    <text x="412" y="286" font-size="11" fill="#E5E7EB">├── requirements.md</text>
    <text x="412" y="306" font-size="11" fill="#E5E7EB">├── design.md</text>
    <text x="412" y="326" font-size="11" fill="#E5E7EB">├── tasks.md</text>
    <text x="412" y="346" font-size="11" fill="#94A3B8">└── .curdx-state.json</text>
    <text x="400" y="376" font-size="10" fill="#4ADE80">↳ 可 review · 可恢复</text>

    <text x="384" y="420" font-size="10" fill="#64748B">需求 / 设计 / 任务</text>
    <text x="384" y="434" font-size="10" fill="#64748B">落到仓库，不是聊天记录</text>
  </g>

  <path d="M656 290 L688 290" stroke="#22C55E" stroke-width="2" marker-end="url(#ovArrZh)"/>

  <g>
    <rect x="696" y="140" width="224" height="304" rx="14" fill="#111827" stroke="#1F2937"/>
    <rect x="696" y="140" width="224" height="32" rx="14" fill="#0F172A"/>
    <rect x="696" y="158" width="224" height="14" fill="#0F172A"/>
    <text x="712" y="161" font-size="10" fill="#64748B">03 · 证据</text>
    <circle cx="904" cy="156" r="3" fill="#4ADE80"/>

    <text x="712" y="200" font-size="14" fill="#E5E7EB" font-weight="700">完成 = 证据</text>

    <g font-size="11" fill="#E5E7EB">
      <rect x="712" y="220" width="14" height="14" rx="3" fill="#022C22" stroke="#4ADE80"/>
      <path d="M715 227 L718 230 L723 224" stroke="#4ADE80" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="734" y="231">测试通过</text>

      <rect x="712" y="244" width="14" height="14" rx="3" fill="#022C22" stroke="#4ADE80"/>
      <path d="M715 251 L718 254 L723 248" stroke="#4ADE80" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="734" y="255">构建干净</text>

      <rect x="712" y="268" width="14" height="14" rx="3" fill="#022C22" stroke="#4ADE80"/>
      <path d="M715 275 L718 278 L723 272" stroke="#4ADE80" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="734" y="279">浏览器验证</text>

      <rect x="712" y="292" width="14" height="14" rx="3" fill="#022C22" stroke="#4ADE80"/>
      <path d="M715 299 L718 302 L723 296" stroke="#4ADE80" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="734" y="303">CI 绿灯</text>

      <rect x="712" y="316" width="14" height="14" rx="3" fill="#022C22" stroke="#4ADE80"/>
      <path d="M715 323 L718 326 L723 320" stroke="#4ADE80" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="734" y="327">发布 / npm</text>
    </g>
    <text x="712" y="372" font-size="10" fill="#4ADE80">写进 .curdx-state.json</text>

    <text x="712" y="420" font-size="10" fill="#64748B">不允许“看着没问题”</text>
    <text x="712" y="434" font-size="10" fill="#64748B">不允许“静默通过”</text>
  </g>

  <rect x="40" y="468" width="880" height="48" rx="10" fill="#0F172A" stroke="#1F2937"/>
  <text x="56" y="497" font-size="12" fill="#94A3B8">$ git diff +</text>
  <text x="170" y="497" font-size="12" fill="#4ADE80" font-weight="700">specs/</text>
  <text x="220" y="497" font-size="12" fill="#94A3B8">+ verificationBlocks  →  唯一可信的“完成”形态</text>
  <text x="824" y="497" font-size="11" fill="#64748B" text-anchor="end">curdx-flow</text>
  <rect x="840" y="482" width="64" height="20" rx="10" fill="#022C22" stroke="#4ADE80"/>
  <text x="872" y="496" font-size="11" fill="#4ADE80" text-anchor="middle" font-weight="700">v1 · ready</text>
</svg>
