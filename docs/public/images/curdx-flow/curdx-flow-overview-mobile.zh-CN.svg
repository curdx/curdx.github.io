<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 640" width="390" height="640" role="img" aria-labelledby="omTitleZh omDescZh" font-family="'JetBrains Mono', ui-monospace, 'PingFang SC', 'Microsoft YaHei', SFMono-Regular, Menlo, Consolas, monospace">
  <title id="omTitleZh">CurdX Flow 手机概览</title>
  <desc id="omDescZh">把目标变成规格和证据 — 竖向布局。</desc>
  <defs>
    <linearGradient id="omBgZh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#050817"/>
    </linearGradient>
    <linearGradient id="omGZh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#86EFAC"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <marker id="omArrZh" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L7 4.5 L0 9 Z" fill="#22C55E"/>
    </marker>
  </defs>

  <rect width="390" height="640" rx="18" fill="url(#omBgZh)"/>
  <rect x="0.5" y="0.5" width="389" height="639" rx="17.5" fill="none" stroke="#1F2937"/>

  <path d="M0 18 Q0 0 18 0 L372 0 Q390 0 390 18 L390 36 L0 36 Z" fill="#0F172A"/>
  <circle cx="18" cy="18" r="4" fill="#475569"/>
  <circle cx="32" cy="18" r="4" fill="#475569"/>
  <circle cx="46" cy="18" r="4" fill="#475569"/>
  <text x="195" y="22" font-size="10" fill="#64748B" text-anchor="middle">curdx-flow · 概览</text>
  <line x1="0" y1="36" x2="390" y2="36" stroke="#1F2937"/>

  <text x="24" y="66" font-size="14" fill="#E5E7EB" font-weight="700">从「帮我做这个」</text>
  <text x="24" y="86" font-size="14" fill="url(#omGZh)" font-weight="700">到有证据的「做完了」</text>
  <text x="24" y="106" font-size="10" fill="#94A3B8">规格进仓库 · PR 带证据 · 可恢复</text>

  <g>
    <rect x="20" y="120" width="350" height="148" rx="12" fill="#111827" stroke="#1F2937"/>
    <text x="36" y="142" font-size="9" fill="#64748B">01 · 目标</text>
    <circle cx="354" cy="138" r="3" fill="#FBBF24"/>
    <text x="36" y="166" font-size="13" fill="#E5E7EB" font-weight="700">先说清楚“完成”是什么</text>
    <rect x="36" y="180" width="318" height="74" rx="8" fill="#020617" stroke="#1F2937"/>
    <text x="48" y="200" font-size="10" fill="#64748B">$</text>
    <text x="60" y="200" font-size="10" fill="#4ADE80">/curdx-flow:start todo-app</text>
    <text x="48" y="218" font-size="10" fill="#94A3B8">  "新增/编辑/完成/删除,</text>
    <text x="48" y="234" font-size="10" fill="#94A3B8">   并用浏览器验证"</text>
    <text x="48" y="248" font-size="10" fill="#64748B">$</text>
    <rect x="60" y="240" width="8" height="11" fill="#4ADE80">
      <animate attributeName="opacity" values="1;0.15;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <path d="M195 274 L195 290" stroke="#22C55E" stroke-width="2" marker-end="url(#omArrZh)"/>

  <g>
    <rect x="20" y="296" width="350" height="148" rx="12" fill="#111827" stroke="#1F2937"/>
    <text x="36" y="318" font-size="9" fill="#64748B">02 · spec/</text>
    <circle cx="354" cy="314" r="3" fill="#A78BFA"/>
    <text x="36" y="342" font-size="13" fill="#E5E7EB" font-weight="700">把方案钉进项目文件</text>
    <rect x="36" y="356" width="318" height="74" rx="8" fill="#020617" stroke="#1F2937"/>
    <text x="48" y="376" font-size="10" fill="#64748B">specs/todo-app/</text>
    <text x="60" y="394" font-size="10" fill="#E5E7EB">├── requirements.md</text>
    <text x="60" y="410" font-size="10" fill="#E5E7EB">├── design.md  ├── tasks.md</text>
    <text x="60" y="426" font-size="10" fill="#94A3B8">└── .curdx-state.json</text>
  </g>

  <path d="M195 450 L195 466" stroke="#22C55E" stroke-width="2" marker-end="url(#omArrZh)"/>

  <g>
    <rect x="20" y="472" width="350" height="120" rx="12" fill="#022C22" stroke="#4ADE80"/>
    <text x="36" y="494" font-size="9" fill="#4ADE80">03 · 证据</text>
    <text x="36" y="518" font-size="13" fill="#E5E7EB" font-weight="700">完成 = 证据</text>
    <g font-size="10" fill="#E5E7EB">
      <text x="36" y="540">✓ 测试通过</text>
      <text x="140" y="540">✓ 构建干净</text>
      <text x="246" y="540">✓ 浏览器</text>
      <text x="36" y="558">✓ CI 绿灯</text>
      <text x="140" y="558">✓ 发布 tag</text>
      <text x="246" y="558" fill="#4ADE80">→ state.json</text>
    </g>
  </g>

  <rect x="20" y="604" width="350" height="22" rx="11" fill="#0F172A" stroke="#1F2937"/>
  <text x="195" y="619" font-size="10" fill="#94A3B8" text-anchor="middle">git diff + <tspan fill="#4ADE80">specs/</tspan> + verificationBlocks</text>
</svg>
