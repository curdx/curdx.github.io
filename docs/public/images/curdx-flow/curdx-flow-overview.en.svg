<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CurdX Flow product overview</title>
  <desc id="desc">Shows the path from a development goal to spec files, task execution, and verification evidence.</desc>
  <defs>
    <filter id="cardShadow" x="-8%" y="-10%" width="116%" height="124%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" stroke="#2563EB" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="960" height="540" rx="28" fill="#F7FAFC"/>
  <rect x="28" y="28" width="904" height="484" rx="24" fill="#FFFFFF" stroke="#E2E8F0"/>

  <text x="56" y="76" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="31" font-weight="800">CurdX Flow</text>
  <text x="56" y="108" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="16">A reviewable, resumable, verifiable workflow for Claude Code.</text>
  <rect x="700" y="62" width="188" height="34" rx="17" fill="#EEF2FF"/>
  <text x="726" y="84" fill="#3730A3" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="700">Built for real delivery</text>

  <g filter="url(#cardShadow)" font-family="Inter, ui-sans-serif, system-ui">
    <rect x="56" y="138" width="252" height="210" rx="18" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="56" y="138" width="252" height="48" rx="18" fill="#EFF6FF"/>
    <text x="80" y="169" fill="#1D4ED8" font-size="18" font-weight="800">1. Describe the goal</text>
    <text x="80" y="216" fill="#334155" font-size="14">Start with one clear request.</text>
    <rect x="80" y="236" width="204" height="72" rx="12" fill="#0F172A"/>
    <text x="96" y="260" fill="#BFDBFE" font-family="SFMono-Regular, ui-monospace, monospace" font-size="12">/curdx-flow:start</text>
    <text x="96" y="282" fill="#E2E8F0" font-family="SFMono-Regular, ui-monospace, monospace" font-size="12">todo-app Build todo</text>

    <rect x="354" y="138" width="252" height="210" rx="18" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="354" y="138" width="252" height="48" rx="18" fill="#ECFDF5"/>
    <text x="378" y="169" fill="#047857" font-size="18" font-weight="800">2. Write specs</text>
    <text x="378" y="216" fill="#334155" font-size="14">Pin the goal to project files.</text>
    <rect x="378" y="236" width="204" height="30" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="392" y="256" fill="#0F172A" font-size="13" font-weight="700">requirements.md</text>
    <rect x="378" y="276" width="204" height="30" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="392" y="296" fill="#0F172A" font-size="13" font-weight="700">design.md</text>
    <rect x="378" y="316" width="204" height="30" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="392" y="336" fill="#0F172A" font-size="13" font-weight="700">tasks.md</text>

    <rect x="652" y="138" width="252" height="210" rx="18" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="652" y="138" width="252" height="48" rx="18" fill="#FFF7ED"/>
    <text x="676" y="169" fill="#C2410C" font-size="18" font-weight="800">3. Execute and prove</text>
    <text x="676" y="216" fill="#334155" font-size="14">Run tasks and keep evidence.</text>
    <circle cx="688" cy="251" r="9" fill="#10B981"/>
    <path d="M684 251L687 254L693 247" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="706" y="256" fill="#0F172A" font-size="14" font-weight="700">Tests or build pass</text>
    <circle cx="688" cy="287" r="9" fill="#2563EB"/>
    <path d="M684 287L687 290L693 283" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="706" y="292" fill="#0F172A" font-size="14" font-weight="700">Browser check passes</text>
    <circle cx="688" cy="323" r="9" fill="#DB2777"/>
    <path d="M684 323L687 326L693 319" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="706" y="328" fill="#0F172A" font-size="14" font-weight="700">PR is reviewable</text>
  </g>

  <path d="M318 244H342" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M616 244H640" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="56" y="390" width="848" height="78" rx="18" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="82" y="423" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="17" font-weight="800">The handoff is more than "done"</text>
  <text x="82" y="449" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="14">You get code changes, spec files, and proof that teammates can review and continue.</text>
  <rect x="660" y="410" width="78" height="30" rx="15" fill="#DBEAFE"/>
  <text x="684" y="430" fill="#1D4ED8" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="800">Code</text>
  <rect x="750" y="410" width="78" height="30" rx="15" fill="#DCFCE7"/>
  <text x="774" y="430" fill="#047857" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="800">Specs</text>
  <rect x="840" y="410" width="42" height="30" rx="15" fill="#FCE7F3"/>
  <text x="854" y="430" fill="#BE185D" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="800">Proof</text>
</svg>
