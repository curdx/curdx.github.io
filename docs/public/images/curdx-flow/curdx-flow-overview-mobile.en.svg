<svg width="390" height="640" viewBox="0 0 390 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CurdX Flow mobile overview</title>
  <desc id="desc">A vertical overview of goal input, spec writing, task execution, and verification evidence.</desc>
  <rect width="390" height="640" rx="22" fill="#F8FAFC"/>
  <rect x="16" y="16" width="358" height="608" rx="20" fill="#FFFFFF" stroke="#E2E8F0"/>

  <text x="34" y="54" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">CurdX Flow</text>
  <text x="34" y="82" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Write the goal to files, execute tasks, keep proof.</text>

  <rect x="34" y="112" width="322" height="118" rx="16" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="54" y="145" fill="#1D4ED8" font-family="Inter, ui-sans-serif, system-ui" font-size="17" font-weight="800">1. Describe the goal</text>
  <text x="54" y="171" fill="#334155" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Tell Claude Code what to build.</text>
  <rect x="54" y="187" width="282" height="28" rx="8" fill="#0F172A"/>
  <text x="70" y="206" fill="#E2E8F0" font-family="SFMono-Regular, ui-monospace, monospace" font-size="11">/curdx-flow:start todo-app</text>

  <path d="M195 240V264" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <path d="M186 256L195 265L204 256" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="34" y="278" width="322" height="142" rx="16" fill="#ECFDF5" stroke="#BBF7D0"/>
  <text x="54" y="311" fill="#047857" font-family="Inter, ui-sans-serif, system-ui" font-size="17" font-weight="800">2. Write specs</text>
  <text x="54" y="337" fill="#334155" font-family="Inter, ui-sans-serif, system-ui" font-size="13">Pin requirements, design, and tasks.</text>
  <rect x="54" y="354" width="282" height="24" rx="7" fill="#FFFFFF" stroke="#D1FAE5"/>
  <text x="68" y="370" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="700">requirements.md</text>
  <rect x="54" y="384" width="282" height="24" rx="7" fill="#FFFFFF" stroke="#D1FAE5"/>
  <text x="68" y="400" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="700">design.md + tasks.md</text>

  <path d="M195 430V454" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <path d="M186 446L195 455L204 446" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="34" y="468" width="322" height="116" rx="16" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="54" y="501" fill="#C2410C" font-family="Inter, ui-sans-serif, system-ui" font-size="17" font-weight="800">3. Execute and prove</text>
  <circle cx="62" cy="530" r="8" fill="#10B981"/>
  <path d="M58 530L61 533L66 527" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="80" y="535" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="700">Test, build, or browser evidence</text>
  <circle cx="62" cy="559" r="8" fill="#DB2777"/>
  <path d="M58 559L61 562L66 556" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="80" y="564" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="700">PR shows goal, plan, and result</text>
</svg>
