<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 560" width="390" height="560" role="img" aria-labelledby="lmTitleZh lmDescZh" font-family="'JetBrains Mono', ui-monospace, 'PingFang SC', 'Microsoft YaHei', SFMono-Regular, Menlo, Consolas, monospace">
  <title id="lmTitleZh">CurdX Flow 闭环（手机）</title>
  <desc id="lmDescZh">目标 → 规格 → 任务 → 执行 → 证据，可通过 refactor 返回。</desc>
  <defs>
    <linearGradient id="lmBgZh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#050817"/>
    </linearGradient>
    <marker id="lmArrZh" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L7 4.5 L0 9 Z" fill="#22C55E"/>
    </marker>
    <marker id="lmArrDimZh" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L7 4.5 L0 9 Z" fill="#A78BFA"/>
    </marker>
  </defs>

  <rect width="390" height="560" rx="18" fill="url(#lmBgZh)"/>
  <rect x="0.5" y="0.5" width="389" height="559" rx="17.5" fill="none" stroke="#1F2937"/>

  <path d="M0 18 Q0 0 18 0 L372 0 Q390 0 390 18 L390 36 L0 36 Z" fill="#0F172A"/>
  <circle cx="18" cy="18" r="4" fill="#475569"/>
  <circle cx="32" cy="18" r="4" fill="#475569"/>
  <circle cx="46" cy="18" r="4" fill="#475569"/>
  <text x="195" y="22" font-size="10" fill="#64748B" text-anchor="middle">curdx-flow · 闭环</text>
  <line x1="0" y1="36" x2="390" y2="36" stroke="#1F2937"/>

  <text x="24" y="62" font-size="13" fill="#E5E7EB" font-weight="700">一个可暂停 · 可重放的循环</text>
  <text x="24" y="80" font-size="10" fill="#94A3B8">每一步都留下文件</text>

  <path d="M340 110 Q40 60 56 102" stroke="#A78BFA" stroke-width="1.4" stroke-dasharray="4 4" fill="none" marker-end="url(#lmArrDimZh)"/>
  <rect x="138" y="92" width="114" height="20" rx="10" fill="#1E1B4B" stroke="#A78BFA"/>
  <text x="195" y="106" font-size="10" fill="#A78BFA" text-anchor="middle" font-weight="700">/refactor · 恢复</text>

  <g>
    <rect x="20" y="128" width="350" height="62" rx="10" fill="#111827" stroke="#1F2937"/>
    <text x="36" y="148" font-size="9" fill="#FBBF24">01 · 目标</text>
    <text x="36" y="170" font-size="13" fill="#E5E7EB" font-weight="700">/start</text>
    <text x="116" y="170" font-size="10" fill="#94A3B8">识别 · 路由 · 恢复 · 拆分</text>
    <text x="36" y="184" font-size="9" fill="#4ADE80">$ /curdx-flow:start todo-app …</text>
  </g>

  <path d="M195 196 L195 208" stroke="#22C55E" stroke-width="2" marker-end="url(#lmArrZh)"/>

  <g>
    <rect x="20" y="214" width="350" height="62" rx="10" fill="#111827" stroke="#1F2937"/>
    <text x="36" y="234" font-size="9" fill="#A78BFA">02 · 规格</text>
    <text x="36" y="256" font-size="13" fill="#E5E7EB" font-weight="700">/research · /design</text>
    <text x="36" y="270" font-size="9" fill="#A78BFA">research.md · requirements.md · design.md</text>
  </g>

  <path d="M195 282 L195 294" stroke="#22C55E" stroke-width="2" marker-end="url(#lmArrZh)"/>

  <g>
    <rect x="20" y="300" width="350" height="62" rx="10" fill="#111827" stroke="#1F2937"/>
    <text x="36" y="320" font-size="9" fill="#22D3EE">03 · 任务</text>
    <text x="36" y="342" font-size="13" fill="#E5E7EB" font-weight="700">/tasks</text>
    <text x="116" y="342" font-size="10" fill="#94A3B8">价值切片，每个都带验证</text>
    <text x="36" y="356" font-size="9" fill="#22D3EE">tasks.md</text>
  </g>

  <path d="M195 368 L195 380" stroke="#22C55E" stroke-width="2" marker-end="url(#lmArrZh)"/>

  <g>
    <rect x="20" y="386" width="350" height="62" rx="10" fill="#111827" stroke="#1F2937"/>
    <text x="36" y="406" font-size="9" fill="#4ADE80">04 · 执行</text>
    <text x="36" y="428" font-size="13" fill="#E5E7EB" font-weight="700">/implement</text>
    <text x="116" y="428" font-size="10" fill="#94A3B8">spec-executor + qa-engineer</text>
    <text x="36" y="442" font-size="9" fill="#4ADE80">$ npm test ✓  · 浏览器 ✓</text>
  </g>

  <path d="M195 454 L195 466" stroke="#22C55E" stroke-width="2" marker-end="url(#lmArrZh)"/>

  <g>
    <rect x="20" y="472" width="350" height="62" rx="10" fill="#022C22" stroke="#4ADE80"/>
    <text x="36" y="492" font-size="9" fill="#4ADE80">05 · 证据</text>
    <text x="36" y="514" font-size="13" fill="#E5E7EB" font-weight="700">完成 = 证据</text>
    <circle cx="338" cy="504" r="11" fill="none" stroke="#4ADE80" stroke-width="1.6"/>
    <path d="M332 504 L337 510 L344 498" stroke="#4ADE80" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="36" y="528" font-size="9" fill="#4ADE80">写入 .curdx-state.json</text>
  </g>
</svg>
