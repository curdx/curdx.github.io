<svg width="390" height="520" viewBox="0 0 390 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CurdX Flow 手机新手路径</title>
  <desc id="desc">竖向展示安装、开始、审查、执行、验证的第一条路径。</desc>
  <rect width="390" height="520" rx="22" fill="#FFFFFF"/>
  <rect x="16" y="16" width="358" height="488" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="34" y="56" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="800">第一次使用路径</text>
  <text x="34" y="84" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="13">照这五步走，先跑通，再深入配置。</text>

  <g font-family="Inter, ui-sans-serif, system-ui" font-size="14">
    <rect x="34" y="116" width="322" height="48" rx="12" fill="#EFF6FF" stroke="#BFDBFE"/>
    <text x="54" y="146" fill="#1D4ED8" font-weight="800">1. 安装插件</text>

    <rect x="34" y="176" width="322" height="48" rx="12" fill="#ECFDF5" stroke="#BBF7D0"/>
    <text x="54" y="206" fill="#047857" font-weight="800">2. 运行 /curdx-flow:start</text>

    <rect x="34" y="236" width="322" height="48" rx="12" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="54" y="266" fill="#C2410C" font-weight="800">3. 审查 requirements.md</text>

    <rect x="34" y="296" width="322" height="48" rx="12" fill="#F5F3FF" stroke="#DDD6FE"/>
    <text x="54" y="326" fill="#6D28D9" font-weight="800">4. 运行 /curdx-flow:implement</text>

    <rect x="34" y="356" width="322" height="48" rx="12" fill="#FDF2F8" stroke="#FBCFE8"/>
    <text x="54" y="386" fill="#BE185D" font-weight="800">5. 检查测试或浏览器证据</text>
  </g>

  <rect x="34" y="436" width="322" height="44" rx="14" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="54" y="463" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="800">中途停了：先运行 /curdx-flow:status</text>
</svg>
