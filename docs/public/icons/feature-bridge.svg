<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Bridge">
  <defs>
    <linearGradient id="brInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="brCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A5F3FC"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="brGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A7F3D0"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="brGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#brInk)" stroke="#1F2937" stroke-width="1.5"/>

  <!-- split-pane terminal -->
  <line x1="32" y1="14" x2="32" y2="50" stroke="#1F2937" stroke-width="1.5"/>

  <g filter="url(#brGlow)" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="700">
    <!-- left pane: > + cursor -->
    <path d="M10 26 L16 32 L10 38" fill="none" stroke="url(#brGreen)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="20" y="28" width="6" height="9" rx="1" fill="url(#brGreen)">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.3s" repeatCount="indefinite"/>
    </rect>

    <!-- right pane: > + cursor -->
    <path d="M38 26 L44 32 L38 38" fill="none" stroke="url(#brCyan)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="48" y="28" width="6" height="9" rx="1" fill="url(#brCyan)">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.3s" repeatCount="indefinite" begin="0.65s"/>
    </rect>
  </g>

  <!-- shared bottom rail -->
  <line x1="10" y1="50" x2="54" y2="50" stroke="#334155" stroke-width="1.5"/>
  <circle cx="32" cy="50" r="2.2" fill="url(#brGreen)"/>
</svg>
